# =============================================================================
# AeroSpace Config — Updated
# =============================================================================
# Changes:
#   - App launching moved to ctrl-alt to prevent key leaking (∫ issue)
#   - Switched from osascript to `open -a` (faster, cleaner)
#   - Added small gaps for visual clarity
#   - Added fullscreen toggle (alt-f)
#   - Added more auto-assign rules
#   - Added extra app launchers
# =============================================================================

# Startup
after-login-command = []
after-startup-command = ['exec-and-forget sketchybar']
start-at-login = true

# SketchyBar workspace change trigger
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout defaults
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Hide app behavior
automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'qwerty'

# Gaps — subtle spacing for visual clarity
[gaps]
    inner.horizontal = 6
    inner.vertical =   6
    outer.left =       6
    outer.bottom =     6
    outer.top =        6
    outer.right =      6

# =============================================================================
# Main binding mode
# =============================================================================
[mode.main.binding]

    # ----- App Launching (ctrl-alt to avoid key leaking) -----
    ctrl-alt-b = 'exec-and-forget open -a "Brave Browser"'
    ctrl-alt-i = 'exec-and-forget open -a "iTerm"'
    ctrl-alt-c = 'exec-and-forget open -a "Visual Studio Code"'
    ctrl-alt-s = 'exec-and-forget open -a "Slack"'
    ctrl-alt-m = 'exec-and-forget open -a "Mail"'
    ctrl-alt-f = 'exec-and-forget open -a "Finder"'

    # ----- Layout -----
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-f = 'fullscreen'

    # ----- Focus (vim-style) -----
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # ----- Move windows -----
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # ----- Resize -----
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # ----- Workspaces -----
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'

    # ----- Move window to workspace -----
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'

    # ----- Workspace navigation -----
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # ----- Service mode -----
    alt-shift-semicolon = 'mode service'

# =============================================================================
# Auto-assign apps to workspaces
# =============================================================================

# Workspace 1 — Browser
[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace 1'

# Workspace 2 — Development
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = 'move-node-to-workspace 2'

# Workspace 3 — Communication
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace 3'

# Workspace 6 — Media
[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = 'move-node-to-workspace 6'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 6'

# =============================================================================
# Service mode
# =============================================================================
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']